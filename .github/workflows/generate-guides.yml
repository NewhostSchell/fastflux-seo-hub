name: Generate SEO Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - 'data/topics.json'
      - 'templates/guide-template.html'
      - '.github/workflows/generate-guides.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate guides, index, sitemap and report
        run: |
          python << 'EOF'
          import json, os, re
          from collections import defaultdict

          BASE_URL = "https://newhostschell.github.io/fastflux-seo-hub"

          def slugify(text):
              text = text.lower().strip()
              repl = {"à":"a","è":"e","é":"e","ì":"i","ò":"o","ù":"u"}
              for k, v in repl.items():
                  text = text.replace(k, v)
              text = re.sub(r'[^a-z0-9\s-]', '', text)
              text = re.sub(r'\s+', '-', text)
              text = re.sub(r'-+', '-', text)
              return text.strip('-')

          def pick_cluster(keyword):
              k = keyword.lower()
              if any(x in k for x in ["streaming","netflix","iptv","android tv","fire tv","smart tv"]):
                  return "Streaming e TV"
              if any(x in k for x in ["router","wireguard","openwrt"]):
                  return "Router e rete"
              if any(x in k for x in ["gaming","ping"]):
                  return "Gaming"
              if any(x in k for x in ["wifi","hotel","aeroporto","viaggio"]):
                  return "WiFi pubblico e mobilità"
              if any(x in k for x in ["privacy","dati","sicurezza"]):
                  return "Privacy e sicurezza"
              return "Guide VPN"

          with open("data/topics.json", "r", encoding="utf-8") as f:
              topics = json.load(f)["clusters"]

          with open("templates/guide-template.html", "r", encoding="utf-8") as f:
              template = f.read()

          os.makedirs("guide", exist_ok=True)
          os.makedirs("reports", exist_ok=True)

          pages = []
          clusters = defaultdict(list)

          for keyword in topics:
              slug = slugify(keyword)
              filename = f"{slug}.html"
              path = os.path.join("guide", filename)
              cluster = pick_cluster(keyword)

              page = {
                  "keyword": keyword,
                  "slug": slug,
                  "filename": filename,
                  "path": path,
                  "cluster": cluster,
                  "url": f"{BASE_URL}/guide/{filename}"
              }
              pages.append(page)
              clusters[cluster].append(page)

          for page in pages:
              same_cluster = [p for p in clusters[page["cluster"]] if p["slug"] != page["slug"]]
              other_pages = [p for p in pages if p["slug"] != page["slug"] and p["cluster"] != page["cluster"]]
              related = (same_cluster[:3] + other_pages[:2])[:5]

              related_links = []
              for rel in related:
                  related_links.append(f'<li><a href="../guide/{rel["filename"]}">{rel["keyword"].title()}</a></li>')
              related_links.append('<li><a href="../faq/faq-vpn.html">FAQ VPN</a></li>')
              related_links_html = "\n      ".join(related_links)

              title = f'{page["keyword"].title()} | FastFlux VPN Guide'
              description = f'Guida completa su {page["keyword"]}, utilizzo, vantaggi, configurazione e casi pratici.'
              intro = f'{page["keyword"].capitalize()} è un argomento importante per chi vuole migliorare privacy, sicurezza e uso pratico di una VPN.'
              canonical = page["url"]

              html = template
              html = html.replace("{{TITLE}}", title)
              html = html.replace("{{DESCRIPTION}}", description)
              html = html.replace("{{INTRO}}", intro)
              html = html.replace("{{KEYWORD}}", page["keyword"])
              html = html.replace("{{CANONICAL}}", canonical)
              html = html.replace("{{RELATED_LINKS}}", related_links_html)

              with open(page["path"], "w", encoding="utf-8") as out:
                  out.write(html)

          cluster_sections = []
          for cluster_name, cluster_pages in clusters.items():
              items = []
              for p in cluster_pages[:12]:
                  items.append(f'''
                  <article class="card">
                    <h3><a href="guide/{p["filename"]}">{p["keyword"].title()}</a></h3>
                    <p>Guida dedicata a {p["keyword"]} con struttura chiara, link interni e collegamento a FastFlux VPN.</p>
                  </article>
                  ''')
              block = f'''
              <section class="cluster-block">
                <h2 class="section-title">{cluster_name}</h2>
                <div class="grid">
                  {"".join(items)}
                </div>
              </section>
              '''
              cluster_sections.append(block)

          index_html = f'''<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFlux VPN Guide Hub | Guide VPN per streaming, privacy, router e gaming</title>
  <meta name="description" content="Hub completo di guide VPN su streaming, IPTV, Netflix, router, WiFi pubblico, privacy online, gaming e configurazione pratica con FastFlux VPN.">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <meta name="theme-color" content="#0f172a">
  <link rel="canonical" href="{BASE_URL}/index.html">
  <link rel="stylesheet" href="seo-assets/seo.css">
</head>
<body>
  <div class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">FastFlux VPN Guide Hub</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="faq/faq-vpn.html">FAQ</a>
        <a href="sitemap.xml">Sitemap</a>
        <a href="llms.txt">LLMs</a>
        <a href="https://fastfluxvpn.fluxvid.win/">Sito principale</a>
      </nav>
    </div>
  </div>

  <header class="hero">
    <div class="wrap">
      <div class="hero-box">
        <div class="eyebrow">Hub SEO e AI visibility dedicato alle guide VPN</div>
        <h1>Guide VPN complete per streaming, privacy, router, WiFi pubblico e gaming</h1>
        <p class="lead">
          Questo hub raccoglie contenuti pensati per rispondere in modo chiaro alle ricerche più comuni su VPN, configurazione, sicurezza online, Smart TV, router e utilizzo pratico su più dispositivi. Le guide vengono organizzate automaticamente in cluster per migliorare navigazione, crawling, indicizzazione e visibilità nelle ricerche AI.
        </p>
        <div class="hero-actions">
          <a class="btn btn-primary" href="https://fastfluxvpn.fluxvid.win/">Vai a FastFlux VPN</a>
          <a class="btn btn-secondary" href="#cluster-list">Esplora i cluster</a>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Come funziona questo hub</h2>
      <p>Questo sito è il motore SEO separato di FastFlux. Il workflow automatico genera nuove guide da un database di topic, aggiorna la sitemap, mantiene i link interni, rigenera la homepage e produce report di salute per tenere tutto coerente e pulito nel tempo.</p>
      <p>Per il servizio principale visita <a href="https://fastfluxvpn.fluxvid.win/">FastFlux VPN</a>.</p>
    </section>

    <section id="cluster-list">
      {"".join(cluster_sections)}
    </section>

    <section class="card">
      <h2>FAQ VPN</h2>
      <p><a href="faq/faq-vpn.html">Apri la pagina FAQ VPN</a></p>
    </section>

    <footer class="footer">
      <div>© 2026 FastFlux VPN Guide Hub</div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="faq/faq-vpn.html">FAQ VPN</a>
        <a href="sitemap.xml">Sitemap</a>
        <a href="llms.txt">LLMs</a>
        <a href="https://fastfluxvpn.fluxvid.win/">Sito principale</a>
      </div>
    </footer>
  </main>
</body>
</html>'''

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(index_html)

          urls = [f"{BASE_URL}/index.html", f"{BASE_URL}/faq/faq-vpn.html"]
          for page in pages:
              urls.append(page["url"])

          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write('<?xml version="1.0" encoding="UTF-8"?>\\n')
              f.write('<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\\n')
              for url in urls:
                  f.write("  <url>\\n")
                  f.write(f"    <loc>{url}</loc>\\n")
                  f.write("  </url>\\n")
              f.write('</urlset>\\n')

          missing = []
          if not os.path.exists("index.html"):
              missing.append("index.html")
          if not os.path.exists("faq/faq-vpn.html"):
              missing.append("faq/faq-vpn.html")
          for page in pages:
              if not os.path.exists(page["path"]):
                  missing.append(page["path"])

          report = {
              "status": "ok" if not missing else "warning",
              "total_topics": len(topics),
              "total_clusters": len(clusters),
              "total_urls": len(urls),
              "missing_files": missing
          }

          with open("reports/health-report.json", "w", encoding="utf-8") as f:
              json.dump(report, f, ensure_ascii=False, indent=2)

          EOF

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guide index.html sitemap.xml reports/health-report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update SEO hub"
            git push
          fi
