name: Velixtor SEO Daily Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  push:
    paths:
      - "data/topics.json"
      - "data/topics-master.json"
      - "templates/guide-template.html"
      - ".github/workflows/generate-guides.yml"

permissions:
  contents: write

jobs:
  seo-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests

      - name: Write SEO engine script
        run: |
          cat > seo_engine.py <<'PY'
          import json
          import os
          import re
          import requests
          from collections import defaultdict

          def normalize_topic(text):
              text = str(text).strip().lower()
              text = re.sub(r"\s+", " ", text)
              return text

          def google_suggest(keyword):
              url = "https://suggestqueries.google.com/complete/search"
              params = {
                  "client": "firefox",
                  "hl": "it",
                  "q": keyword
              }
              try:
                  r = requests.get(url, params=params, timeout=10)
                  data = r.json()
                  return data[1]
              except:
                  return []

          BASE_URL = "https://guide.velixtor.com"
          MAIN_SITE_URL = "https://velixtor.com"

          os.makedirs("data", exist_ok=True)
          os.makedirs("guide", exist_ok=True)
          os.makedirs("reports", exist_ok=True)

          def slugify(text):
              text = text.lower().strip()
              repl = {"à":"a","è":"e","é":"e","ì":"i","ò":"o","ù":"u"}
              for k, v in repl.items():
                  text = text.replace(k, v)
              text = re.sub(r"[^a-z0-9\s-]", "", text)
              text = re.sub(r"\s+", "-", text)
              text = re.sub(r"-+", "-", text)
              return text.strip("-")

          def pick_cluster(keyword):
              k = keyword.lower()
              if any(x in k for x in ["streaming", "netflix", "iptv", "android tv", "fire tv", "smart tv"]):
                  return "Streaming e TV"
              if any(x in k for x in ["router", "wireguard", "openwrt"]):
                  return "Router e rete"
              if any(x in k for x in ["gaming", "ping"]):
                  return "Gaming"
              if any(x in k for x in ["wifi", "hotel", "aeroporto", "viaggio"]):
                  return "WiFi pubblico e mobilità"
              if any(x in k for x in ["privacy", "dati", "sicurezza", "no log", "privata"]):
                  return "Privacy e sicurezza"
              return "Guide VPN"

          def topic_allowed(topic):
              t = normalize_topic(topic)

              blocked_fragments = [
                  "gratis", "free", "mod", "apk", "premium", "download", "crack", "hack",
                  "reddit", "proxy error", "error", "not working", "household",
                  "wwe", "turkey", "cheap", "cheapest", "price", "review", "manual",
                  "default password", "apkmirror", "downloader code",
                  "nordvpn", "nord vpn", "expressvpn", "express vpn", "surfshark",
                  "protonvpn", "proton vpn", "cyberghost", "privatevpn", "pia",
                  "private internet access", "windscribe", "mullvad", "opera vpn",
                  "urban vpn", "turbo vpn", "hola vpn", "atlas vpn", "mcafee", "norton",
                  "bitdefender", "kaspersky", "malwarebytes", "adguard", "mozilla vpn",
                  "perfect privacy", "privacy dot"
              ]

              blocked_exact = {
                  "vpn installazione vpn",
                  "vpn configurazione vpn",
                  "vpn vpn no log",
                  "vpn mas veloces"
              }

              if not t:
                  return False

              if t in blocked_exact:
                  return False

              if len(t) > 65:
                  return False

              if sum(1 for c in t if c.isdigit()) > 2:
                  return False

              if any(b in t for b in blocked_fragments):
                  return False

              return True

          master_path = "data/topics-master.json"

          if os.path.exists(master_path):
              with open(master_path, "r", encoding="utf-8") as f:
                  data = json.load(f)
          elif os.path.exists("data/topics.json"):
              with open("data/topics.json", "r", encoding="utf-8") as f:
                  raw = json.load(f)
              if "topics" in raw:
                  topics = raw["topics"]
              elif "clusters" in raw:
                  topics = raw["clusters"]
              else:
                  topics = []
              data = {"topics": topics}
              with open(master_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
          else:
              data = {"topics": []}
              with open(master_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          raw_topics = [normalize_topic(t) for t in data.get("topics", []) if str(t).strip()]
          topics = []

          for t in raw_topics:
              if topic_allowed(t) and t not in topics:
                  topics.append(t)

          data["topics"] = topics

          with open(master_path, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          guide_folder = "guide"
          if os.path.exists(guide_folder):
              for filename in os.listdir(guide_folder):
                  lower_name = filename.lower()
                  if not topic_allowed(lower_name.replace(".html", "").replace("-", " ")):
                      try:
                          os.remove(os.path.join(guide_folder, filename))
                      except:
                          pass

          seed_keywords = [
              "vpn streaming",
              "vpn gaming",
              "vpn privacy",
              "vpn no log",
              "vpn wifi pubblico",
              "vpn router"
          ]

          serp_topics = []
          for seed in seed_keywords:
              suggestions = google_suggest(seed)
              for s in suggestions:
                  s = normalize_topic(s)
                  if topic_allowed(s) and s not in topics and s not in serp_topics:
                      serp_topics.append(s)

          serp_topics = serp_topics[:8]

          if serp_topics:
              topics.extend(serp_topics)
              data["topics"] = topics
              with open(master_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          with open("reports/serp-discovery-report.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "seed_keywords": seed_keywords,
                      "serp_topics_added": serp_topics,
                      "count_added": len(serp_topics)
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          new_topics = []
          api_key = os.environ.get("OPENAI_API_KEY", "").strip()

          if api_key:
              try:
                  from openai import OpenAI
                  client = OpenAI(api_key=api_key)

                  prompt = f"""
          Existing VPN SEO topics:
          {topics}

          Suggest exactly 8 NEW Italian SEO topics for a VPN guide hub for Velixtor.

          Requirements:
          - focus on streaming, gaming, privacy, no log, router, wifi pubblico, smart tv
          - informational intent only
          - short search-style phrases
          - no duplicates
          - no competitor brands
          - no 'gratis', 'free', 'reddit', 'mod', 'apk', 'error', 'not working'
          - no piracy, hacking, illegal or adult topics
          - output ONLY valid JSON in this format:
          {{"topics":["topic 1","topic 2","topic 3","topic 4","topic 5","topic 6","topic 7","topic 8"]}}
                  """

                  response = client.responses.create(
                      model="gpt-4.1-mini",
                      input=prompt
                  )

                  text = response.output[0].content[0].text
                  result = json.loads(text)

                  for t in result.get("topics", []):
                      t = normalize_topic(t)
                      if topic_allowed(t) and t not in topics and t not in new_topics:
                          new_topics.append(t)

              except Exception:
                  new_topics = []

          if new_topics:
              topics.extend(new_topics)
              data["topics"] = topics
              with open(master_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          with open("reports/ai-discovery-report.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "new_topics": new_topics,
                      "count_added": len(new_topics),
                      "total_topics": len(topics)
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          expanded_topics = []
          for topic in topics:
              suggestions = google_suggest(topic)
              count = 0

              for s in suggestions:
                  s = normalize_topic(s)
                  if topic_allowed(s) and s not in topics and s not in expanded_topics:
                      expanded_topics.append(s)
                      count += 1
                  if count >= 2:
                      break

          if expanded_topics:
              topics.extend(expanded_topics)
              data["topics"] = topics
              with open(master_path, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          with open("reports/related-keywords-report.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "related_topics_added": expanded_topics,
                      "count_added": len(expanded_topics),
                      "total_topics": len(topics)
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          with open("templates/guide-template.html", "r", encoding="utf-8") as f:
              template = f.read()

          pages = []
          clusters = defaultdict(list)

          for keyword in topics:
              slug = slugify(keyword)
              filename = f"{slug}.html"
              path = os.path.join("guide", filename)
              cluster = pick_cluster(keyword)

              page = {
                  "keyword": keyword,
                  "slug": slug,
                  "filename": filename,
                  "path": path,
                  "cluster": cluster,
                  "url": f"{BASE_URL}/guide/{filename}"
              }
              pages.append(page)
              clusters[cluster].append(page)

          for page in pages:
              same_cluster = [p for p in clusters[page["cluster"]] if p["slug"] != page["slug"]]
              other_pages = [p for p in pages if p["slug"] != page["slug"] and p["cluster"] != page["cluster"]]
              related = (same_cluster[:3] + other_pages[:2])[:5]

              related_links = []
              for rel in related:
                  related_links.append(
                      f'<li><a href="../guide/{rel["filename"]}">{rel["keyword"].title()}</a></li>'
                  )
              related_links.append('<li><a href="../faq/faq-vpn.html">FAQ VPN</a></li>')
              related_links.append('<li><a href="../index.html">Torna all’hub</a></li>')
              related_links_html = "\n      ".join(related_links)

              title = f'{page["keyword"].title()} | Velixtor Guide'
              description = f'Guida pratica su {page["keyword"]}: utilizzo, vantaggi, configurazione e casi reali.'
              intro = f'{page["keyword"].capitalize()} è una guida utile per capire come usare una VPN in modo più sicuro, stabile e pratico.'
              canonical = page["url"]

              html = template
              html = html.replace("{{TITLE}}", title)
              html = html.replace("{{DESCRIPTION}}", description)
              html = html.replace("{{INTRO}}", intro)
              html = html.replace("{{KEYWORD}}", page["keyword"])
              html = html.replace("{{CANONICAL}}", canonical)
              html = html.replace("{{RELATED_LINKS}}", related_links_html)

              with open(page["path"], "w", encoding="utf-8") as out:
                  out.write(html)

          cluster_sections = []
          for cluster_name, cluster_pages in clusters.items():
              items = []
              for p in cluster_pages[:12]:
                  items.append(
                      f'''
                      <article class="card">
                        <h3><a href="guide/{p["filename"]}">{p["keyword"].title()}</a></h3>
                        <p>Guida pratica su {p["keyword"]} con focus su utilizzo reale, sicurezza e collegamento diretto a Velixtor.</p>
                      </article>
                      '''
                  )
              block = f'''
              <section class="cluster-block">
                <h2 class="section-title">{cluster_name}</h2>
                <div class="grid">
                  {"".join(items)}
                </div>
              </section>
              '''
              cluster_sections.append(block)

          index_html = f"""<!DOCTYPE html>
          <html lang="it">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Velixtor Guide Hub | Guide VPN per streaming, gaming, privacy e WiFi pubblico</title>
            <meta name="description" content="Hub completo di guide VPN su streaming, smart TV, router, gaming, privacy, no log e WiFi pubblico con collegamento diretto a Velixtor.">
            <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
            <meta name="theme-color" content="#0f172a">
            <link rel="canonical" href="{BASE_URL}/index.html">
            <link rel="stylesheet" href="seo-assets/seo.css">
          </head>
          <body>
            <div class="topbar">
              <div class="wrap topbar-inner">
                <div class="brand">Velixtor Guide Hub</div>
                <nav class="nav">
                  <a href="index.html">Home</a>
                  <a href="faq/faq-vpn.html">FAQ</a>
                  <a href="sitemap.xml">Sitemap</a>
                  <a href="llms.txt">LLMs</a>
                  <a href="{MAIN_SITE_URL}">Sito principale</a>
                </nav>
              </div>
            </div>

            <header class="hero">
              <div class="wrap">
                <div class="hero-box">
                  <div class="eyebrow">Guide VPN aggiornate per streaming, privacy e sicurezza</div>
                  <h1>Guide VPN complete per streaming, gaming, privacy, no log, router e WiFi pubblico</h1>
                  <p class="lead">
                    Questo hub raccoglie guide pensate per rispondere in modo chiaro alle ricerche più importanti su VPN, configurazione, sicurezza online, Smart TV, router, gaming e protezione su reti pubbliche. Le pagine sono organizzate in cluster per migliorare navigazione, crawling, indicizzazione e collegamento verso Velixtor.
                  </p>
                  <div class="hero-actions">
                    <a class="btn btn-primary" href="{MAIN_SITE_URL}">Vai a Velixtor</a>
                    <a class="btn btn-secondary" href="#cluster-list">Esplora le guide</a>
                  </div>
                </div>
              </div>
            </header>

            <main class="wrap">
              <section class="card">
                <h2>Come funziona questo hub</h2>
                <p>Questo sito raccoglie guide VPN organizzate per cluster tematici come streaming, gaming, router, WiFi pubblico, privacy e no log. L’obiettivo è offrire contenuti utili, chiari e facili da navigare, mantenendo una struttura forte per indicizzazione, link interni e visibilità organica.</p>
                <p>Per il servizio principale visita <a href="{MAIN_SITE_URL}">Velixtor.com</a>.</p>
              </section>

              <section id="cluster-list">
                {"".join(cluster_sections)}
              </section>

              <section class="card">
                <h2>FAQ VPN</h2>
                <p><a href="faq/faq-vpn.html">Apri la pagina FAQ VPN</a></p>
              </section>

              <footer class="footer">
                <div>© 2026 Velixtor Guide Hub</div>
                <div class="footer-links">
                  <a href="index.html">Home</a>
                  <a href="faq/faq-vpn.html">FAQ VPN</a>
                  <a href="sitemap.xml">Sitemap</a>
                  <a href="llms.txt">LLMs</a>
                  <a href="{MAIN_SITE_URL}">Sito principale</a>
                </div>
              </footer>
            </main>
          </body>
          </html>
          """

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(index_html)

          urls = [
              f"{BASE_URL}/index.html",
              f"{BASE_URL}/faq/faq-vpn.html",
              f"{BASE_URL}/llms.txt"
          ]
          for page in pages:
              urls.append(page["url"])

          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write('<?xml version="1.0" encoding="UTF-8"?>\n')
              f.write('<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n')
              for url in urls:
                  f.write("  <url>\n")
                  f.write(f"    <loc>{url}</loc>\n")
                  f.write("  </url>\n")
              f.write("</urlset>\n")

          missing = []
          if not os.path.exists("index.html"):
              missing.append("index.html")
          if not os.path.exists("faq/faq-vpn.html"):
              missing.append("faq/faq-vpn.html")
          if not os.path.exists("llms.txt"):
              missing.append("llms.txt")
          for page in pages:
              if not os.path.exists(page["path"]):
                  missing.append(page["path"])

          with open("reports/health-report.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "status": "ok" if not missing else "warning",
                      "total_topics": len(topics),
                      "total_clusters": len(clusters),
                      "total_urls": len(urls),
                      "missing_files": missing
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )
          PY

      - name: Run SEO engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python seo_engine.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/topics-master.json reports/ai-discovery-report.json reports/serp-discovery-report.json reports/related-keywords-report.json guide index.html sitemap.xml reports/health-report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update Velixtor SEO hub"
            git push
          fi
